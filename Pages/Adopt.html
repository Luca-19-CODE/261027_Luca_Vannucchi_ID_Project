<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="keywords" content="templete, initial setup, html, css, link, futureUse">
    <meta name="author" content="Luca Vannucchi 261027">

    <title>Adopt</title>

    <link rel="stylesheet" href="/CSS/Adopt.css">

    <!-- Google font -->
    <link rel="preconnect" href="http://fonts.googleapis.com">
    <!-- bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

        crossorigin="anonymous"></script>

    <!-- google font search button -->
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=shopping_basket" />

</head>

<body>

    <!-- ==================== HEADER START ==================== -->
    <header>
        <!-- Header Image Container Start -->
        <div class="HeaderImage">

            <!-- Navbar Start -->
            <nav class="navbar">
                
                <!-- Logo Start -->
                <div class="logo">
                    <img src="../Assets/IMG/logo.png" width="100px" alt="The Mythos Cradle Logo">
                </div>
                <!-- Logo End -->

                <!-- Navbar Page Links Start -->
                <div class="navLinks">
                    <div class="menu">
                        <a href="../Pages/Home.html">Home</a>
                        <a href="#">Adopt</a>
                        <a href="../Pages/Contact.html">Contact</a>
                    </div>
                </div>
                <!-- Navbar Page Links End -->

                <!-- Search Bar Start -->
                <div class="Search">
                    <input type="text" placeholder="Search">
                    <button type="submit">
                        <span class="material-symbols-outlined">
                            shopping_basket
                        </span>
                    </button>
                </div>
                <!-- Search Bar End -->
                
            </nav>
            <!-- Navbar End -->

            <!-- Hero Image Start -->
            <div class="ImageFace">
                <img src="../Assets/IMG/homeImg1.png" alt="Hero Image">
            </div>
            <!-- Hero Image End -->

            <!-- Hero Section Start -->
            <section class="hero">
                <h1>Adopt a Creature</h1>
            </section>
            <!-- Hero Section End -->

        </div>
        <!-- Header Image Container End -->
    </header>
    <!-- ==================== HEADER END ==================== -->






<!-- ==================== FOOTER START ==================== -->
    <footer class="site-footer">
        <div class="footer-wrapper">
            
            <!-- Footer Logo Start -->
            <div class="footer-logo">
                <img src="../Assets/IMG/logo.png" alt="The Mythos Cradle" width="270">
                <p>Where every legendary creature finds a loving home.</p>
            </div>
            <!-- Footer Logo End -->

            <!-- Footer Company Links Start -->
            <div class="footer-company">
                <h4>Company</h4>
                <ul>
                    <li><a href="../Pages/Home.html">Home</a></li>
                    <li><a href="#">Adopt</a></li>
                    <li><a href="../Pages/Contact.html">Contact Us</a></li>
                </ul>
            </div>
            <!-- Footer Company Links End -->

            <!-- Footer Social Media Start -->
            <div class="footer-social">
                <h4>Social Media Links</h4>
                <div class="social-icons">
                    <a href="https://www.facebook.com/theopenwindow"><img src="../Assets/IMG/sm1.png" alt="Facebook" width="75"></a>
                    <a href="https://www.tiktok.com/@open_window_"><img src="../Assets/IMG/sm2.png" alt="TikTok" width="75"></a>
                    <a href="https://www.instagram.com/openwindowinstitute/"><img src="../Assets/IMG/sm3.png" alt="Instagram" width="75"></a>
                    <a href="https://x.com/open_window_"><img src="../Assets/IMG/sm4.png" alt="X" width="75"></a>
                </div>
            </div>
            <!-- Footer Social Media End -->

        </div>

        <!-- Footer Bottom Start -->
        <div class="footer-bottom">
            <p>All Rights Reserved @ Open Window 2024</p>
            <p>Terms & Conditions | Privacy & Policy</p>
        </div>
        <!-- Footer Bottom End -->

    </footer>
